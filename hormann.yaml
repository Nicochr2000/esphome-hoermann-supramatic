# =============================================================================
#  Hörmann SupraMatic (HCP2 / UAP1 emulation) — ESPHome configuration
# -----------------------------------------------------------------------------
#  ESP32 + RS485 transceiver wired onto the drive's bus connector.
#  The ESP pretends to be a Hörmann UAP1 universal adapter and exposes the door
#  to Home Assistant (open / close / stop / vent / light + status feedback).
#
#  Vendored component lives in ./components (uapbridge + uapbridge_esp).
#  Tested with ESPHome 2026.2.x / 2026.3.x on the esp-idf framework.
# =============================================================================

substitutions:
  name: "supramatic-e3"
  friendly_name: "SupraMatic E3"

  # Entity display names
  state: "State"
  relay_state: "Relay state"
  got_valid_broadcast: "Valid status received"
  error_state: "Error"
  prewarn_state: "Pre-warning"
  light: "${friendly_name} Light"
  sw_vent: "${friendly_name} Venting"
  sw_light: "Switch Light"
  btn_vent: "${friendly_name} Vent"
  btn_impulse: "${friendly_name} Impulse"

  # --- Position estimation (see cover below) ---------------------------------
  # The HCP/UAP bus does NOT report an absolute position, only open/closed/moving.
  # These travel times are the INITIAL SEED for the estimated position (0-100 %).
  # With auto_calibration enabled the cover refines them automatically from every
  # full open/close cycle, so a rough guess here is fine.
  open_duration: "15s"
  close_duration: "15s"

esphome:
  name: hormann
  friendly_name: "${friendly_name}"

esp32:
  board: esp32dev
  framework:
    # This component talks to the ESP-IDF UART driver directly, so esp-idf is required.
    type: esp-idf
    # Optional: if ESPHome logs "Chip rev >= 3.0 detected ...", your ESP32 is a
    # recent revision and you can uncomment the two lines below to shrink the
    # binary a little. Leave it commented if unsure (a too-high value would stop
    # an older chip from booting).
    # advanced:
    #   minimum_chip_revision: "3.1"

external_components:
  # Vendored locally to avoid build/OTA failures if GitHub is unavailable.
  - source:
      type: local
      path: components
    components: [uapbridge, uapbridge_esp]

logger:
  level: WARN
  # Disable the serial logger so it can never fight with the UART bus.
  # Logs are still available over the network (API / OTA logs).
  baud_rate: 0

api:
  encryption:
    key: !secret garagedoor_api_encryption_key
  # Keep the door controller running even if Home Assistant / the API is down.
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret garagedoor_ota_password

# Recover automatically from a bad firmware boot (failed OTA / bad config).
safe_mode:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  # Do not reboot if Wi-Fi drops; the door logic stays fully local.
  reboot_timeout: 0s
  ap:
    ssid: "Hormann Fallback Hotspot"
    password: !secret garagedoor_ap_password

captive_portal:

# -----------------------------------------------------------------------------
#  RS485 bus (HCP2): 19200 baud, 8 data bits, no parity, 1 stop bit.
#  rx_pin / tx_pin go to the RX/DI of your RS485 transceiver.
# -----------------------------------------------------------------------------
uart:
  id: uart_bus
  baud_rate: 19200
  rx_pin: 16
  tx_pin: 17

uapbridge_esp:
  id: garage_door_comp
  uart_id: uart_bus
  # Set rts_pin only if your transceiver needs an explicit DE/RE direction line.
  # Auto-direction transceivers (e.g. MAX13487) leave this unset.
  # rts_pin: 4
  #
  # Try to auto-clear a harmless latched error after an interrupted cycle.
  auto_correction: true

# -----------------------------------------------------------------------------
#  Cover (the garage door itself)
# -----------------------------------------------------------------------------
cover:
  - platform: uapbridge
    name: "${friendly_name}"
    device_class: garage
    # Position slider + "go to position X %", with a self-learning estimate.
    #  - auto_calibration: learn the real travel times from full open/close
    #    cycles and persist them to flash (survives reboots). The estimate keeps
    #    improving as you use the door.
    #  - open_duration / close_duration: initial seed used until the first full
    #    cycle is measured. Omit all three lines for a plain open/closed door.
    auto_calibration: true
    open_duration: ${open_duration}
    close_duration: ${close_duration}

# -----------------------------------------------------------------------------
#  Auxiliary entities
# -----------------------------------------------------------------------------
switch:
  - platform: uapbridge
    venting_switch:
      id: venting_switch
      name: "${sw_vent}"
    # Uncomment to control the light as a switch instead of the light component.
    # light_switch:
    #   id: light_switch
    #   name: "${sw_light}"

binary_sensor:
  - platform: uapbridge
    relay_state:
      name: "${relay_state}"
    error_state:
      name: "${error_state}"
    prewarn_state:
      name: "${prewarn_state}"
    got_valid_broadcast:
      name: "${got_valid_broadcast}"

output:
  - platform: uapbridge
    id: gd_light

light:
  - platform: uapbridge
    id: my_light
    name: "${light}"
    output: gd_light

text_sensor:
  - platform: uapbridge
    id: garage_door_state
    name: "${state}"
    # State strings reported by the firmware are already in English:
    #   Open / Closed / Opening / Closing / Stopped / Venting / Error

button:
  - platform: uapbridge
    vent_button:
      id: button_vent
      name: "${btn_vent}"
    impulse_button:
      id: button_impulse
      name: "${btn_impulse}"
